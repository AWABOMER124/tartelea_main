name: tartelea_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.1
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  intl: ^0.20.2
  url_launcher: ^6.3.2
  lucide_icons_flutter: ^3.1.10
  video_player: ^2.11.1
  chewie: ^1.13.0
  just_audio: ^0.10.5
  audio_video_progress_bar: ^2.0.3
  rxdart: ^0.28.0
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 21
