services:
  # Local-only docker-compose stack for web + backend + PostgreSQL.
  # Production should use Dokploy-managed secrets and Traefik routing.

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-tartelea-db}
      POSTGRES_USER: ${DB_USER:-tartelea}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      # Bind to localhost by default so PostgreSQL is not exposed publicly.
      - "127.0.0.1:${DB_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-development}
      PORT: "3000"

      # DB: use container hostname inside Compose
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-tartelea-db}
      DB_USER: ${DB_USER:-tartelea}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}

      # Managed DB fallback
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_SSL: ${DATABASE_SSL:-}

      JWT_SECRET: ${JWT_SECRET:-change_me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}

      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      AUTO_VERIFY_EMAIL: ${AUTO_VERIFY_EMAIL:-true}
      OTP_DEV_FALLBACK: ${OTP_DEV_FALLBACK:-true}
      SUBSCRIPTIONS_PAUSED: ${SUBSCRIPTIONS_PAUSED:-true}
      TRAINER_EMAILS: ${TRAINER_EMAILS:-}

      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}

      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}

      DIRECTUS_URL: ${DIRECTUS_URL:-}
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}
    ports:
      # Bind to localhost by default so the API isn't exposed publicly.
      - "127.0.0.1:${BACKEND_PORT_HOST:-3000}:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/v1/ready').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: .
    ports:
      # Bind to localhost by default. Change WEB_PORT_HOST if needed.
      - "127.0.0.1:${WEB_PORT_HOST:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
